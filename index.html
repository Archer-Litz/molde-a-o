<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forja de Ações - JJK RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        /* Tema Padrão: Gojo (Azul Infinito e Ciano) */
        :root {
            --bg-main: #020617;
            --bg-panel: #0f172a;
            --bg-input: #1e293b;
            --accent: #3b82f6; 
            --accent-hover: #2563eb;
            --accent-light: rgba(59, 130, 246, 0.2);
            --border-color: #334155;
            --text-main: #f8fafc;
            --gradient-start: #60a5fa;
            --gradient-end: #a855f7;
            --shadow-color: rgba(59, 130, 246, 0.15);
            --icon-color: #3b82f6;
        }

        /* Tema Sukuna (Vermelho Sangue e Laranja Chamas) */
        [data-theme="sukuna"] {
            --bg-main: #0a0202;
            --bg-panel: #1a0505;
            --bg-input: #2a0808;
            --accent: #ef4444; 
            --accent-hover: #dc2626;
            --accent-light: rgba(239, 68, 68, 0.2);
            --border-color: #450a0a;
            --gradient-start: #ef4444;
            --gradient-end: #f97316; 
            --shadow-color: rgba(239, 68, 68, 0.15);
            --icon-color: #ef4444;
        }

        /* Tema Geto (Preto e Dourado) */
        [data-theme="geto"] {
            --bg-main: #0a0a0f;
            --bg-panel: #13131a;
            --bg-input: #1a1a24;
            --accent: #d4af37; 
            --accent-hover: #b5952f;
            --accent-light: rgba(212, 175, 55, 0.2);
            --border-color: #2a2a35;
            --gradient-start: #d4af37;
            --gradient-end: #fcd34d;
            --shadow-color: rgba(212, 175, 55, 0.15);
            --icon-color: #d4af37;
        }

        /* Tema Kenjaku (Carmesim e Roxo Escuro) */
        [data-theme="kenjaku"] {
            --bg-main: #090505;
            --bg-panel: #140b0b;
            --bg-input: #201111;
            --accent: #dc2626; 
            --accent-hover: #b91c1c;
            --accent-light: rgba(220, 38, 38, 0.2);
            --border-color: #3f1d1d;
            --gradient-start: #dc2626;
            --gradient-end: #9333ea; 
            --shadow-color: rgba(147, 51, 234, 0.15);
            --icon-color: #9333ea;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            transition: all 0.5s ease;
            background-image: radial-gradient(circle at top right, var(--shadow-color) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, var(--shadow-color) 0%, transparent 40%);
            min-height: 100vh;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: var(--bg-panel); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .input-style {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            padding: 0.5rem 0.75rem;
            color: var(--text-main);
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }
        
        .input-style:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .theme-btn {
            transition: all 0.3s ease;
            opacity: 0.6;
            filter: grayscale(80%);
            border: 1px solid transparent;
        }
        
        .theme-btn.active {
            opacity: 1;
            filter: grayscale(0%);
            transform: scale(1.05);
            background-color: var(--bg-input);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-light);
        }

        .text-gradient {
            background: linear-gradient(to right, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.5s ease;
        }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8 flex flex-col lg:flex-row gap-6">

    <!-- Coluna Esquerda: Formulário -->
    <div class="w-full lg:w-1/2 xl:w-7/12 flex flex-col gap-6">
        
        <!-- Cabeçalho & Temas -->
        <div class="bg-[var(--bg-panel)] rounded-xl p-5 shadow-xl border border-[var(--border-color)] transition-colors duration-500">
            <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-6 gap-4">
                <h1 class="text-xl md:text-2xl font-black uppercase tracking-wider text-gradient flex items-center gap-3">
                    <i class="fa-solid fa-bolt text-[var(--icon-color)] transition-colors duration-500"></i> Construtor de Ações
                </h1>
                
                <div class="flex flex-wrap gap-2">
                    <button onclick="setTheme('gojo')" id="theme-gojo" class="theme-btn active flex items-center gap-2 px-3 py-1.5 rounded-lg bg-black/40 text-xs font-bold text-blue-400">
                        <i class="fa-solid fa-eye"></i> Gojo
                    </button>
                    <button onclick="setTheme('sukuna')" id="theme-sukuna" class="theme-btn flex items-center gap-2 px-3 py-1.5 rounded-lg bg-black/40 text-xs font-bold text-red-500">
                        <i class="fa-solid fa-fire"></i> Sukuna
                    </button>
                    <button onclick="setTheme('geto')" id="theme-geto" class="theme-btn flex items-center gap-2 px-3 py-1.5 rounded-lg bg-black/40 text-xs font-bold text-yellow-500">
                        <i class="fa-solid fa-mask"></i> Geto
                    </button>
                    <button onclick="setTheme('kenjaku')" id="theme-kenjaku" class="theme-btn flex items-center gap-2 px-3 py-1.5 rounded-lg bg-black/40 text-xs font-bold text-purple-500">
                        <i class="fa-solid fa-brain"></i> Kenjaku
                    </button>
                </div>
            </div>

            <div class="mb-2">
                <label class="block text-xs font-bold mb-2 text-zinc-400">Estilo de Formatação do Status:</label>
                <select id="styleSelector" class="input-style font-medium focus:ring-0">
                    <option value="1">Padrão RPG (Subtexto -# e Links Visíveis)</option>
                    <option value="2">Modo Oculto (Nomes das Técnicas em ||Spoiler||)</option>
                    <option value="3">Modo Terminal (Status dentro de um Bloco de Código ```)</option>
                    <option value="4">Ficha Completa (Lista de Todos os Atributos Físicos)</option>
                    <option value="5">Ação Simples (Apenas Narração e Ping, sem Status)</option>
                </select>
            </div>

        <!-- Formulário Rolável -->
        <div class="bg-[var(--bg-panel)] rounded-xl p-5 shadow-xl border border-[var(--border-color)] overflow-y-auto max-h-[75vh] custom-scrollbar flex flex-col gap-6 transition-colors duration-500">
            
            <!-- Secção: Narração -->
            <div>
                <h2 class="section-title"><i class="fa-solid fa-pen-nib text-[var(--icon-color)]"></i> Narração & RP</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Pensamento <span class="text-zinc-600 font-normal">(Opcional)</span></label>
                        <textarea id="f_thought" rows="2" class="input-style resize-none custom-scrollbar" placeholder="Ex: Então é esse o poder dele..."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Ação Inicial <span class="text-zinc-600 font-normal">(Opcional)</span></label>
                        <textarea id="f_action1" rows="3" class="input-style resize-none custom-scrollbar" placeholder="Ex: Ele salta para trás desviando do golpe..."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Diálogo <span class="text-zinc-600 font-normal">(Opcional)</span></label>
                        <textarea id="f_dialogue" rows="2" class="input-style resize-none custom-scrollbar" placeholder="Ex: Você vai morrer aqui, pulga maldita."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Ação Final / Consequência <span class="text-zinc-600 font-normal">(Opcional)</span></label>
                        <textarea id="f_action2" rows="3" class="input-style resize-none custom-scrollbar" placeholder="Ex: Após a fala, ele empunha sua espada..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Secção: Sistema / Status -->
            <div>
                <h2 class="section-title"><i class="fa-solid fa-chart-simple text-[var(--icon-color)]"></i> Dados do Sistema</h2>
                
                <!-- Nova Tabela de Todos os Atributos -->
                <details class="group mb-4">
                    <summary class="cursor-pointer text-xs font-bold text-zinc-300 bg-[var(--bg-input)] p-2 rounded border border-[var(--border-color)] hover:border-[var(--accent)] transition-colors">
                        <i class="fa-solid fa-caret-right transition-transform group-open:rotate-90 mr-1"></i> Todos os Atributos Físicos (Usado na "Ficha Completa")
                    </summary>
                    <div class="grid grid-cols-3 md:grid-cols-5 gap-2 mt-2 p-3 bg-[var(--bg-panel)] rounded border border-[var(--border-color)]">
                        <div><label class="block text-[10px] text-zinc-400">Força</label><input type="text" id="s_forca" value="10" class="input-style !text-xs !p-1"></div>
                        <div><label class="block text-[10px] text-zinc-400">Velocid.</label><input type="text" id="s_velocidade" value="10" class="input-style !text-xs !p-1"></div>
                        <div><label class="block text-[10px] text-zinc-400">Resist.</label><input type="text" id="s_resistencia" value="10" class="input-style !text-xs !p-1"></div>
                        <div><label class="block text-[10px] text-zinc-400">Energia</label><input type="text" id="s_energia" value="10" class="input-style !text-xs !p-1"></div>
                        <div><label class="block text-[10px] text-zinc-400">Reflexo</label><input type="text" id="s_reflexo" value="10" class="input-style !text-xs !p-1"></div>
                        <div><label class="block text-[10px] text-zinc-400">Intel.</label><input type="text" id="s_inteligencia" value="10" class="input-style !text-xs !p-1"></div>
                        <div><label class="block text-[10px] text-zinc-400">Agilidade</label><input type="text" id="s_agilidade" value="10" class="input-style !text-xs !p-1"></div>
                        <div><label class="block text-[10px] text-zinc-400">Iniciat.</label><input type="text" id="s_iniciativa" value="10" class="input-style !text-xs !p-1"></div>
                        <div><label class="block text-[10px] text-zinc-400">Maestria</label><input type="text" id="s_maestria" value="I" class="input-style !text-xs !p-1"></div>
                    </div>
                </details>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Atributo Focado (Ex: Inteligência)</label>
                        <input type="text" id="s_attrName" value="Inteligência" class="input-style">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Valor / Dado (Ex: 80)</label>
                        <input type="text" id="s_attrVal" value="80" class="input-style">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Arma/Item Focado (Ex: Lança)</label>
                        <input type="text" id="s_weaponName" value="Lança" class="input-style">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Rank da Arma (Ex: E)</label>
                        <input type="text" id="s_weaponRank" value="E" class="input-style">
                    </div>
                </div>

                <!-- Lista Dinâmica de Técnicas -->
                <div class="bg-[var(--bg-input)] p-4 rounded-lg border border-[var(--border-color)] mb-4">
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-xs font-bold text-zinc-300">Técnicas / Maldições Utilizadas:</label>
                        <button onclick="addTechnique()" class="bg-[var(--accent)] text-black text-xs font-bold px-3 py-1 rounded hover:opacity-80 transition-opacity">
                            <i class="fa-solid fa-plus"></i> Adicionar
                        </button>
                    </div>
                    <div id="techList" class="space-y-3">
                        <!-- Itens renderizados pelo JS -->
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Seigen Total Restante</label>
                        <input type="text" id="s_seigen" value="265S" class="input-style">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Ação Extra do Turno</label>
                        <input type="text" id="s_extra" value="+ Guardou seu Turno" class="input-style">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1 text-zinc-400">Menção (Ping)</label>
                        <input type="text" id="s_ping" value="<@ID_DO_JOGADOR>" class="input-style">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Coluna Direita: Saída / Output -->
    <div class="w-full lg:w-1/2 xl:w-5/12 flex flex-col">
        <div class="bg-[var(--bg-panel)] rounded-xl p-0 shadow-2xl border border-[var(--border-color)] flex-grow flex flex-col overflow-hidden relative transition-colors duration-500">
            
            <div class="bg-[var(--bg-input)] p-4 flex justify-between items-center border-b border-[var(--border-color)]">
                <h2 class="text-sm font-bold text-zinc-200 flex items-center gap-2">
                    <i class="fa-brands fa-discord text-[#5865F2]"></i> Previsão do Discord
                </h2>
                <button onclick="copyOutput()" class="bg-[var(--accent)] text-black font-bold text-xs px-4 py-2 rounded shadow-lg active:scale-95 flex items-center gap-2 transition-transform">
                    <i class="fa-regular fa-copy"></i> Copiar Ação
                </button>
            </div>
            
            <textarea id="output" class="w-full h-full min-h-[600px] flex-grow bg-transparent p-6 text-zinc-300 font-mono text-sm outline-none resize-none custom-scrollbar leading-relaxed" spellcheck="false" readonly></textarea>
            
            <!-- Toast Notification -->
            <div id="toast" class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-emerald-500 text-white px-6 py-2 rounded-full text-sm font-bold opacity-0 transition-opacity duration-300 pointer-events-none shadow-[0_0_15px_rgba(16,185,129,0.5)] z-50">
                Ação Copiada!
            </div>
        </div>
    </div>

    <script>
        // Gestão de Temas
        const themes = ['gojo', 'sukuna', 'geto', 'kenjaku'];
        
        function setTheme(themeName) {
            if (themeName === 'gojo') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', themeName);
            }

            themes.forEach(t => {
                const btn = document.getElementById(`theme-${t}`);
                if (btn) {
                    if (t === themeName) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            });
        }

        // Estado das Técnicas
        let techniques = [
            { id: 1, name: "Nome da Técnica", link: "", cost: "-50S" },
            { id: 2, name: "Outra Técnica", link: "", cost: "-75S" }
        ];

        function renderTechniques() {
            const container = document.getElementById('techList');
            container.innerHTML = '';
            
            techniques.forEach(tech => {
                const html = `
                    <div class="flex flex-col sm:flex-row gap-2 items-start sm:items-center bg-[var(--bg-panel)] p-2 rounded border border-[var(--border-color)]">
                        <input type="text" placeholder="Nome" value="${tech.name}" oninput="updateTech(${tech.id}, 'name', this.value)" class="input-style text-xs flex-1 !p-1.5">
                        <input type="text" placeholder="Link (Opcional)" value="${tech.link}" oninput="updateTech(${tech.id}, 'link', this.value)" class="input-style text-xs flex-1 !p-1.5">
                        <input type="text" placeholder="Gasto (-50S)" value="${tech.cost}" oninput="updateTech(${tech.id}, 'cost', this.value)" class="input-style text-xs w-24 !p-1.5">
                        <button onclick="removeTechnique(${tech.id})" class="text-red-500 hover:text-red-400 p-1.5" title="Remover">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                container.innerHTML += html;
            });
            generateOutput();
        }

        function addTechnique() {
            const newId = techniques.length > 0 ? Math.max(...techniques.map(t => t.id)) + 1 : 1;
            techniques.push({ id: newId, name: "", link: "", cost: "" });
            renderTechniques();
        }

        function removeTechnique(id) {
            techniques = techniques.filter(t => t.id !== id);
            renderTechniques();
        }

        function updateTech(id, field, value) {
            const tech = techniques.find(t => t.id === id);
            if(tech) {
                tech[field] = value;
                generateOutput();
            }
        }

        // Geração do Output
        function generateOutput() {
            const style = document.getElementById('styleSelector').value;
            
            // Textos Narrativos
            const thought = document.getElementById('f_thought').value.trim();
            const action1 = document.getElementById('f_action1').value.trim();
            const dialogue = document.getElementById('f_dialogue').value.trim();
            const action2 = document.getElementById('f_action2').value.trim();

            // Textos de Status
            const attrName = document.getElementById('s_attrName').value.trim();
            const attrVal = document.getElementById('s_attrVal').value.trim();
            const weaponName = document.getElementById('s_weaponName').value.trim();
            const weaponRank = document.getElementById('s_weaponRank').value.trim();
            const seigen = document.getElementById('s_seigen').value.trim();
            const extra = document.getElementById('s_extra').value.trim();
            const ping = document.getElementById('s_ping').value.trim();

            // Atributos Completos
            const forca = document.getElementById('s_forca') ? document.getElementById('s_forca').value.trim() : '10';
            const vel = document.getElementById('s_velocidade') ? document.getElementById('s_velocidade').value.trim() : '10';
            const res = document.getElementById('s_resistencia') ? document.getElementById('s_resistencia').value.trim() : '10';
            const ene = document.getElementById('s_energia') ? document.getElementById('s_energia').value.trim() : '10';
            const ref = document.getElementById('s_reflexo') ? document.getElementById('s_reflexo').value.trim() : '10';
            const int = document.getElementById('s_inteligencia') ? document.getElementById('s_inteligencia').value.trim() : '10';
            const agi = document.getElementById('s_agilidade') ? document.getElementById('s_agilidade').value.trim() : '10';
            const ini = document.getElementById('s_iniciativa') ? document.getElementById('s_iniciativa').value.trim() : '10';
            const mae = document.getElementById('s_maestria') ? document.getElementById('s_maestria').value.trim() : 'I';

            let out = "";
            let hasNarrative = false;

            // --- BLOCO 1: Narração ---
            if (thought) {
                out += `> > *"-${thought}"*\n> \n`;
                hasNarrative = true;
            }
            if (action1) {
                out += `> *${action1}*\n> \n`;
                hasNarrative = true;
            }
            if (dialogue) {
                out += `> *"-${dialogue}"*\n> \n`;
                hasNarrative = true;
            }
            if (action2) {
                out += `> *${action2}*\n`;
                hasNarrative = true;
            }

            // Limpar formatação residual se terminou com "> \n"
            if(hasNarrative && out.endsWith("> \n")) {
                out = out.substring(0, out.length - 3);
            }
            
            // --- BLOCO 2: Sistema (De acordo com o Estilo escolhido) ---
            
            // Se o estilo for 5 (Ação Simples), ignoramos os blocos de Status.
            if (style !== "5") {
                // Helper para formatar a técnica consoante o estilo
                const formatTech = (tech, isHidden) => {
                    if(!tech.name) return "";
                    let namePart = tech.link ? `[${tech.name}](${tech.link})` : tech.name;
                    
                    // Se for Estilo 2 (Oculto), esconder a técnica
                    if (isHidden) namePart = `||${namePart}||`;
                    
                    let costPart = tech.cost ? ` [ \`${tech.cost}\` ]` : "";
                    return `— ${namePart}${costPart}`;
                };

                // Estilo 1, 2 e 4 usam Subtexto do Discord (-#)
                if (style === "1" || style === "2" || style === "4") {
                    const isHidden = style === "2";
                    
                    if (attrName || weaponName || techniques.length > 0 || seigen || style === "4") {
                        out += `\n`;

                        // Renderiza atributos completos no estilo 4
                        if (style === "4") {
                            out += `-# ***— Atributos Físicos e Mentais:***\n`;
                            out += `-# ***For: ${forca} | Vel: ${vel} | Res: ${res} | Ene: ${ene} | Ref: ${ref}***\n`;
                            out += `-# ***Int: ${int} | Agi: ${agi} | Ini: ${ini} | Mae: ${mae}***\n`;
                            out += `-# ***– – – – – – – – – – – – – – – – – – – – – – – – – – – – – – –***\n`;
                        } else if (attrName && attrVal) {
                            out += `-# ***— ${attrName}: ${attrVal} | Passivo [ \`${attrVal}\` ]***\n`;
                            out += `-# ***– – – – – – – – – – – – – – – – – – – – – – – – – – – – – – –***\n`;
                        }

                        if (weaponName && weaponRank) {
                            out += `-# ***— Rank [ \`${weaponName}\` ]: ${weaponRank}***\n`;
                            out += `-# ***– – – – – – – – – – – – – – – – – – – – – – – – – – – – – – –***\n`;
                        }
                        
                        techniques.forEach(tech => {
                            const formatted = formatTech(tech, isHidden);
                            if(formatted) out += `-# ***${formatted}***\n`;
                        });

                        if (techniques.length > 0 && seigen) {
                            out += `-# ***– – – – – – – – – – – – – – – – – – – – – – – – – – – – – – –***\n`;
                        }
                        
                        if (seigen) {
                            out += `-# ***— Seigen total: ${seigen}***\n`;
                        }
                    }
                } 
                // Estilo 3 usa Bloco de Código (```)
                else if (style === "3") {
                    if (attrName || weaponName || techniques.length > 0 || seigen) {
                        out += `\n\`\`\`ansi\n`;
                        
                        if (attrName && attrVal) {
                            out += `— ${attrName}: ${attrVal} | Passivo [ ${attrVal} ]\n`;
                            out += `-------------------------------------------------\n`;
                        }
                        if (weaponName && weaponRank) {
                            out += `— Rank [ ${weaponName} ]: ${weaponRank}\n`;
                            out += `-------------------------------------------------\n`;
                        }
                        
                        techniques.forEach(tech => {
                            if(tech.name) {
                                let costPart = tech.cost ? ` [ ${tech.cost} ]` : "";
                                out += `— ${tech.name}${costPart}\n`; // Não pode usar hiperlink em bloco de código
                            }
                        });

                        if (techniques.length > 0 && seigen) {
                            out += `-------------------------------------------------\n`;
                        }
                        
                        if (seigen) {
                            out += `— Seigen total: ${seigen}\n`;
                        }
                        out += `\`\`\``;
                    }
                }

                // --- Rodapé Final de Ações (Ignorado se for só Ação Simples) ---
                if (extra) out += `\n***${extra}***\n`;
            }

            // O Ping sempre aparece, independentemente do estilo (pois marca a vez do oponente)
            if (ping) out += `\n${ping}`;

            document.getElementById('output').value = out;
        }

        function copyOutput() {
            const outEl = document.getElementById('output');
            outEl.select();
            document.execCommand('copy');
            
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2500);
        }

        // Listeners para atualização automática
        document.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('input', generateOutput);
        });

        // Setup Inicial
        renderTechniques();

    </script>
</body>
</html>
